site_name: The Universal Graph Machine
site_description: A machine that reasons — and can always show its work. A tutorial for curious beginners.
site_url: https://ercasta.github.io/Universal-Graph-Machine/
repo_url: https://github.com/ercasta/Universal-Graph-Machine
repo_name: ercasta/Universal-Graph-Machine
copyright: >
  Made with care for anyone curious about how machines can reason ·
  <a href="https://github.com/ercasta/Universal-Graph-Machine">View the project on GitHub</a>

# Simpler, deterministic paths (playground/detective.html) so the live pages
# can reference the Pyodide wheel with a plain relative URL.
use_directory_urls: false

theme:
  name: material
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - navigation.footer
    - content.code.copy
    - toc.follow
    - search.suggest
    - search.highlight
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/playground.js

nav:
  - Home: index.md
  - "Part 1 — Basic":
      - "0 · A machine that explains itself": basic/00-a-machine-that-explains-itself.md
      - "1 · The substrate": basic/01-the-substrate.md
      - "2 · Telling the machine facts": basic/02-facts.md
      - "3 · Asking questions": basic/03-questions.md
      - "4 · Rules: the word \"when\"": basic/04-rules.md
  - "Part 2 — Intermediate":
      - "5 · \"No\" and \"I don't know\"": intermediate/05-no-and-unknown.md
      - "6 · Only chase what you need": intermediate/06-only-what-you-need.md
      - "7 · Talking to the machine": intermediate/07-controlled-language.md
      - "8 · Because…": intermediate/08-because.md
  - "Part 3 — Advanced":
      - "9 · Supposing": advanced/09-supposing.md
      - "10 · Living in an uncertain world": advanced/10-uncertain-world.md
      - "11 · More or less": advanced/11-more-or-less.md
      - "12 · Same name, same person?": advanced/12-identity.md
      - "13 · Gathering evidence": advanced/13-gathering-evidence.md
      - "14 · Paying attention": advanced/14-paying-attention.md
      - "15 · The machine underneath": advanced/15-the-machine-underneath.md
  - "Part 4 — The internals":
      - "16 · A rule is a little program": deep/16-instruction-set.md
      - "17 · Nine ways to think": deep/17-modes.md
      - "18 · Shades of maybe: the machinery": deep/18-uncertain-world-internals.md
      - "19 · The machine's attitude": deep/19-firmware.md
      - "20 · Thinking harder": deep/20-thinking-harder.md
  - "Playground":
      - "The detective case": playground/detective.md
      - "The uncertain case": playground/uncertain.md
      - "The hard case": playground/harder.md
  - "Appendix — concepts": appendix/index.md
